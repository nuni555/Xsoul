<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminXsoul - ระบบจัดการผู้ใช้</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh; color: #fff;
    }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 40px; border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      width: 100%; max-width: 400px;
    }
    .login-box h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; font-size: 28px; }
    .login-box .subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 16px;
      outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: #00d4ff; }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none; border-radius: 8px; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg { color: #ff6b6b; text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
    .admin-panel { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap; gap: 12px;
    }
    .admin-header h1 { color: #00d4ff; font-size: 28px; }
    .admin-header .who { color: #aaa; font-size: 13px; margin-top: 4px; }
    .logout-btn {
      padding: 10px 20px; background: rgba(255,107,107,0.2);
      border: 1px solid #ff6b6b; border-radius: 8px;
      color: #ff6b6b; cursor: pointer; transition: all 0.3s;
    }
    .logout-btn:hover { background: #ff6b6b; color: #fff; }
    .search-bar { margin-bottom: 24px; }
    .search-bar input {
      width: 100%; padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none;
    }
    .search-bar input:focus { border-color: #00d4ff; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 20px; border-radius: 12px; text-align: center;
    }
    .stat-card h3 { color: #aaa; font-size: 13px; margin-bottom: 10px; }
    .stat-card .value { color: #00d4ff; font-size: 26px; font-weight: 700; }
    .users-table { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: auto; }
    .users-table table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .users-table th, .users-table td {
      padding: 14px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .users-table th {
      background: rgba(0,212,255,0.1); color: #00d4ff;
      font-weight: 600; font-size: 13px; text-transform: uppercase;
    }
    .users-table tr:hover { background: rgba(255,255,255,0.05); }
    .users-table td { font-size: 14px; }
    .action-btn {
      padding: 6px 12px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; margin-right: 5px; transition: all 0.3s;
    }
    .edit-btn { background: rgba(0,212,255,0.2); color: #00d4ff; border: 1px solid #00d4ff; }
    .edit-btn:hover { background: #00d4ff; color: #fff; }
    .delete-btn { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; }
    .delete-btn:hover { background: #ff6b6b; color: #fff; }
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: rgba(26,26,46,0.97); backdrop-filter: blur(10px);
      padding: 28px; border-radius: 16px;
      width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-header h2 { color: #00d4ff; font-size: 22px; }
    .close-btn { background: none; border: none; color: #aaa; font-size: 28px; cursor: pointer; }
    .close-btn:hover { color: #fff; }
    .edit-form { display: grid; gap: 14px; }
    .edit-form .form-group input,
    .edit-form .form-group textarea,
    .edit-form .form-group select { padding: 10px; font-size: 14px; }
    .edit-form .form-group textarea { resize: vertical; min-height: 80px; }
    .save-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none; border-radius: 8px; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .loading, .no-results { text-align: center; padding: 40px; color: #aaa; }
    .credit-badge { display: inline-block; padding: 4px 8px; background: rgba(0,212,255,0.2); border-radius: 4px; color: #00d4ff; font-size: 12px; font-weight: 600; }
    .role-badge, .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .role-admin { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .role-user { background: rgba(0,212,255,0.2); color: #00d4ff; }
    .status-active { background: rgba(76,175,80,0.2); color: #4caf50; }
    .status-banned { background: rgba(255,107,107,0.2); color: #ff6b6b; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <h1>🔐 AdminXsoul</h1>
      <p class="subtitle">เข้าสู่ระบบด้วยบัญชี Firebase ที่มีสิทธิ์ admin</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <div>
        <h1>👑 AdminXsoul Panel</h1>
        <div class="who" id="currentAdmin"></div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><h3>Total Users</h3><div class="value" id="totalUsers">0</div></div>
      <div class="stat-card"><h3>Total Credits</h3><div class="value" id="totalCredits">0</div></div>
      <div class="stat-card"><h3>Active Users</h3><div class="value" id="activeUsers">0</div></div>
      <div class="stat-card"><h3>Banned Users</h3><div class="value" id="bannedUsers">0</div></div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 ค้นหาจาก username, email หรือ UID..." oninput="handleSearch()">
    </div>

    <div class="users-table">
      <table>
        <thead>
          <tr>
            <th>UID</th><th>Username</th><th>Email</th><th>Credits</th>
            <th>Role</th><th>Status</th><th>Created</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="8" class="loading">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit User</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="edit-form" id="editForm"></div>
      <div style="margin-top: 20px; text-align: right;">
        <button class="save-btn" onclick="saveUserChanges()">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // ===== Firebase Config =====
    // หมายเหตุ: apiKey ของ Firebase ฝั่ง client ไม่ใช่ "ความลับ" — ความปลอดภัยจริง
    // อยู่ที่ Firebase Authentication + Realtime Database Security Rules (ดูคู่มือท้ายไฟล์)
    const firebaseConfig = {
      apiKey: "AIzaSyBUPSUB6Ic8lqKYC7FTRa_szjQmTFeXYlQ",
      authDomain: "xsoul-hud-21e3d.firebaseapp.com",
      projectId: "xsoul-hud-21e3d",
      storageBucket: "xsoul-hud-21e3d.appspot.com",
      databaseURL: "https://xsoul-hud-21e3d-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let allUsers = [];
    let currentEditingUser = null;
    let currentAdminUid = null;

    // ===== Helpers =====
    const $ = (id) => document.getElementById(id);
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function friendlyAuthError(code) {
      const map = {
        'auth/invalid-email': 'รูปแบบอีเมลไม่ถูกต้อง',
        'auth/user-disabled': 'บัญชีนี้ถูกปิดใช้งาน',
        'auth/user-not-found': 'ไม่พบบัญชีนี้',
        'auth/wrong-password': 'รหัสผ่านไม่ถูกต้อง',
        'auth/invalid-credential': 'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
        'auth/too-many-requests': 'พยายามเข้าระบบบ่อยเกินไป กรุณารอสักครู่',
        'auth/network-request-failed': 'เชื่อมต่อเครือข่ายไม่ได้'
      };
      return map[code] || code;
    }

    // ===== Auth =====
    async function handleLogin() {
      const email = $('loginEmail').value.trim();
      const password = $('loginPassword').value;
      const errorEl = $('loginError');
      const btn = $('loginBtn');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = '❌ กรุณากรอกอีเมลและรหัสผ่าน';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      try {
        await auth.signInWithEmailAndPassword(email, password);
        // onAuthStateChanged จะตรวจสิทธิ์ admin ต่อ
      } catch (err) {
        errorEl.textContent = '❌ ' + friendlyAuthError(err.code);
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    }

    async function handleLogout() {
      await auth.signOut();
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        showLoginScreen();
        return;
      }
      // ตรวจสิทธิ์ admin จาก database (ต้องตั้ง rules ให้อ่าน users/$uid/isAdmin ของตัวเองได้)
      try {
        const snap = await db.ref(`users/${user.uid}/isAdmin`).once('value');
        if (snap.val() === true) {
          currentAdminUid = user.uid;
          $('currentAdmin').textContent = `เข้าสู่ระบบในชื่อ: ${user.email}`;
          showAdminPanel();
        } else {
          await auth.signOut();
          $('loginError').textContent = '❌ บัญชีนี้ไม่มีสิทธิ์ admin';
          showLoginScreen();
        }
      } catch (err) {
        await auth.signOut();
        $('loginError').textContent = '❌ ตรวจสิทธิ์ไม่สำเร็จ: ' + err.message;
        showLoginScreen();
      }
    });

    function showLoginScreen() {
      $('loginScreen').style.display = 'flex';
      $('adminPanel').style.display = 'none';
      $('loginPassword').value = '';
    }

    function showAdminPanel() {
      $('loginScreen').style.display = 'none';
      $('adminPanel').style.display = 'block';
      $('loginError').textContent = '';
      loadUsers();
    }

    // ===== Data =====
    async function loadUsers() {
      const tbody = $('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading users...</td></tr>';
      try {
        const snapshot = await db.ref('users').once('value');
        const usersData = snapshot.val() || {};
        allUsers = Object.entries(usersData).map(([uid, u]) => ({
          uid,
          username: u.username || u.handle || 'N/A',
          email: u.email || 'N/A',
          credits: Number(u.credits) || 0,
          role: u.role || (u.isAdmin ? 'admin' : 'user'),
          status: u.status || (u.isBanned ? 'banned' : 'active'),
          createdAt: u.createdAt || 'N/A',
          lastLogin: u.lastLogin || 'N/A',
          isAdmin: !!u.isAdmin,
          isBanned: !!u.isBanned,
          banReason: u.banReason || ''
        }));
        updateStats();
        renderUsers(allUsers);
      } catch (error) {
        console.error('Error loading users:', error);
        tbody.innerHTML = `<tr><td colspan="8" class="no-results">❌ โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function updateStats() {
      $('totalUsers').textContent = allUsers.length;
      $('totalCredits').textContent = allUsers.reduce((s, u) => s + u.credits, 0).toLocaleString();
      $('activeUsers').textContent = allUsers.filter(u => !u.isBanned && u.status !== 'banned').length;
      $('bannedUsers').textContent = allUsers.filter(u => u.isBanned || u.status === 'banned').length;
    }

    function renderUsers(users) {
      const tbody = $('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="no-results">ไม่พบผู้ใช้</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => {
        const banned = u.isBanned || u.status === 'banned';
        return `
        <tr>
          <td style="font-family:monospace;font-size:12px;">${escapeHtml(u.uid.substring(0,12))}…</td>
          <td><strong>${escapeHtml(u.username)}</strong></td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="credit-badge">${u.credits.toLocaleString()}</span></td>
          <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${escapeHtml(u.role)}</span></td>
          <td><span class="status-badge ${banned ? 'status-banned' : 'status-active'}">${banned ? 'Banned' : 'Active'}</span></td>
          <td style="font-size:12px;">${escapeHtml(formatDate(u.createdAt))}</td>
          <td>
            <button class="action-btn edit-btn" data-uid="${escapeHtml(u.uid)}" data-act="edit">Edit</button>
            <button class="action-btn delete-btn" data-uid="${escapeHtml(u.uid)}" data-act="ban">${banned ? 'Unban' : 'Ban'}</button>
          </td>
        </tr>`;
      }).join('');
      // Bind events (ปลอดภัยกว่า inline onclick กับ uid ที่อาจมีอักขระพิเศษ)
      tbody.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uid = btn.getAttribute('data-uid');
          if (btn.getAttribute('data-act') === 'edit') editUser(uid);
          else banUser(uid);
        });
      });
    }

    function handleSearch() {
      const q = $('searchInput').value.toLowerCase();
      if (!q) return renderUsers(allUsers);
      renderUsers(allUsers.filter(u =>
        u.username.toLowerCase().includes(q) ||
        u.email.toLowerCase().includes(q) ||
        u.uid.toLowerCase().includes(q)
      ));
    }

    function editUser(uid) {
      currentEditingUser = allUsers.find(u => u.uid === uid);
      if (!currentEditingUser) return;
      const u = currentEditingUser;
      $('editForm').innerHTML = `
        <div class="form-group"><label>UID</label><input type="text" value="${escapeHtml(u.uid)}" disabled></div>
        <div class="form-group"><label>Username</label><input type="text" id="editUsername" value="${escapeHtml(u.username)}"></div>
        <div class="form-group"><label>Email</label><input type="email" id="editEmail" value="${escapeHtml(u.email)}"></div>
        <div class="form-group"><label>Credits</label><input type="number" id="editCredits" value="${u.credits}"></div>
        <div class="form-group"><label>Role</label>
          <select id="editRole">
            <option value="user" ${u.role==='user'?'selected':''}>User</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="editStatus">
            <option value="active" ${!u.isBanned?'selected':''}>Active</option>
            <option value="banned" ${u.isBanned?'selected':''}>Banned</option>
          </select>
        </div>
        <div class="form-group"><label>Ban Reason</label><textarea id="editBanReason">${escapeHtml(u.banReason)}</textarea></div>
        <div class="form-group"><label>Created At</label><input type="text" value="${escapeHtml(formatDate(u.createdAt))}" disabled></div>
        <div class="form-group"><label>Last Login</label><input type="text" value="${escapeHtml(formatDate(u.lastLogin))}" disabled></div>
      `;
      $('editModal').classList.add('active');
    }

    function closeEditModal() {
      $('editModal').classList.remove('active');
      currentEditingUser = null;
    }

    async function saveUserChanges() {
      if (!currentEditingUser) return;
      const status = $('editStatus').value;
      const role = $('editRole').value;
      const updates = {
        username: $('editUsername').value.trim(),
        email: $('editEmail').value.trim(),
        credits: parseInt($('editCredits').value, 10) || 0,
        role,
        isAdmin: role === 'admin',
        status,
        isBanned: status === 'banned',
        banReason: $('editBanReason').value
      };
      // กันแอดมินถอดสิทธิ์ตัวเองโดยไม่ตั้งใจ (ทำให้ล็อกออกจาก panel ทันที)
      if (currentEditingUser.uid === currentAdminUid && !updates.isAdmin) {
        if (!confirm('คุณกำลังถอดสิทธิ์ admin ของตัวเอง — จะถูกออกจากระบบทันที ดำเนินการต่อ?')) return;
      }
      try {
        await db.ref(`users/${currentEditingUser.uid}`).update(updates);
        alert('✅ บันทึกสำเร็จ');
        closeEditModal();
        loadUsers();
      } catch (err) {
        alert('❌ บันทึกไม่สำเร็จ: ' + err.message);
      }
    }

    async function banUser(uid) {
      const u = allUsers.find(x => x.uid === uid);
      if (!u) return;
      if (uid === currentAdminUid) { alert('ไม่สามารถ ban ตัวเองได้'); return; }
      const willBan = !u.isBanned;
      if (!confirm(willBan ? `Ban ${u.username} ?` : `Unban ${u.username} ?`)) return;
      const reason = willBan ? (prompt('เหตุผลการ ban (ไม่บังคับ):') || '') : '';
      try {
        await db.ref(`users/${uid}`).update({
          isBanned: willBan,
          status: willBan ? 'banned' : 'active',
          banReason: reason
        });
        loadUsers();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }

    function formatDate(d) {
      if (!d || d === 'N/A') return 'N/A';
      try {
        const date = new Date(d);
        if (isNaN(date.getTime())) return String(d);
        return date.toLocaleString('th-TH', {
          year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
        });
      } catch { return String(d); }
    }

    // Enter key เพื่อ login
    ['loginEmail','loginPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>

  <!--
  ============================================================
   วิธีใช้งาน / Setup (อ่านให้ครบก่อนใช้งานจริง)
  ============================================================

  1) เปิดใช้ Email/Password ใน Firebase Console
     - Authentication → Sign-in method → เปิด "Email/Password"

  2) สร้างบัญชี admin ตัวแรก
     - Authentication → Users → Add user → กรอก email + password
     - คัดลอก UID ของผู้ใช้ที่เพิ่งสร้าง

  3) ตั้งสิทธิ์ admin ใน Realtime Database
     - ไปที่ Realtime Database → Data
     - สร้างโหนด: users/<UID ที่คัดลอกมา>/isAdmin = true
       (ตัวอย่าง path: users/abc123XYZ/isAdmin  ค่า: true)

  4) ตั้ง Security Rules ของ Realtime Database (สำคัญที่สุด!)
     ห้ามใช้ rules แบบเปิด ".read": true / ".write": true เด็ดขาด
     คัดลอกชุดนี้ไปวางในแท็บ Rules:

     {
       "rules": {
         "users": {
           // เฉพาะ admin เท่านั้นที่อ่าน list ทั้งหมดได้
           ".read": "auth != null && root.child('users').child(auth.uid).child('isAdmin').val() === true",
           "$uid": {
             // user อ่าน/แก้ข้อมูลตัวเองได้ ส่วน admin จัดการได้ทุกคน
             ".read":  "auth != null && (auth.uid === $uid || root.child('users').child(auth.uid).child('isAdmin').val() === true)",
             ".write": "auth != null && (auth.uid === $uid || root.child('users').child(auth.uid).child('isAdmin').val() === true)",
             // user ห้ามตั้ง isAdmin ให้ตัวเอง — แก้ได้เฉพาะ admin
             "isAdmin": {
               ".write": "auth != null && root.child('users').child(auth.uid).child('isAdmin').val() === true"
             },
             "role": {
               ".write": "auth != null && root.child('users').child(auth.uid).child('isAdmin').val() === true"
             }
           }
         }
       }
     }

  5) วิธีล็อกอิน
     - เปิดไฟล์ AdminXsoul.html ในเบราว์เซอร์ (หรือ deploy บน hosting)
     - กรอก email + password ของบัญชี admin ที่สร้างไว้
     - ระบบจะตรวจว่า users/<uid>/isAdmin === true ถึงจะเข้าได้

  ============================================================
   สิ่งที่แก้จากไฟล์เดิม (สรุปด้านความปลอดภัย)
  ============================================================
   ❌ เดิม: hardcode username/password ใน JS (ใครเปิด DevTools ก็เห็น)
   ❌ เดิม: ใช้ localStorage แค่ flag = ปลอมได้ใน 1 คลิก
   ❌ เดิม: ไม่มีการตรวจสิทธิ์จริง อ่าน/เขียน users ทั้งหมดได้ถ้า rules เปิด
   ❌ เดิม: ใส่ค่าผู้ใช้ลงใน innerHTML ตรง ๆ → เสี่ยง XSS

   ✅ ใหม่: ใช้ Firebase Authentication (Email/Password) จริง
   ✅ ใหม่: ตรวจสิทธิ์ผ่าน users/$uid/isAdmin + Security Rules
   ✅ ใหม่: escape ทุกค่าที่ render ลง DOM (กัน XSS)
   ✅ ใหม่: กัน admin ถอดสิทธิ์/แบนตัวเองโดยไม่ตั้งใจ
   ✅ ใหม่: ข้อความ error แบบเข้าใจง่ายภาษาไทย
