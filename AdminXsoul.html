<!DOCTYPE html>
//https://sora-2547.github.io/Xsoul/AdminXsoul.html//
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminXsoul - ระบบจัดการผู้ใช้</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d4ff;
      font-size: 28px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: #00d4ff;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
    }
    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }
    .admin-panel {
      display: none;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .admin-header h1 {
      color: #00d4ff;
      font-size: 32px;
    }
    .logout-btn {
      padding: 10px 20px;
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid #ff6b6b;
      border-radius: 8px;
      color: #ff6b6b;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover {
      background: #ff6b6b;
      color: #fff;
    }
    .search-bar {
      margin-bottom: 30px;
    }
    .search-bar input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .search-bar input:focus {
      border-color: #00d4ff;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-card h3 {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .stat-card .value {
      color: #00d4ff;
      font-size: 28px;
      font-weight: 700;
    }
    .users-table {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
    }
    .users-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .users-table th,
    .users-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .users-table th {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
    }
    .users-table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .users-table td {
      font-size: 14px;
    }
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 5px;
      transition: all 0.3s;
    }
    .edit-btn {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }
    .edit-btn:hover {
      background: #00d4ff;
      color: #fff;
    }
    .delete-btn {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }
    .delete-btn:hover {
      background: #ff6b6b;
      color: #fff;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .modal-header h2 {
      color: #00d4ff;
      font-size: 24px;
    }
    .close-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 28px;
      cursor: pointer;
      transition: color 0.3s;
    }
    .close-btn:hover {
      color: #fff;
    }
    .edit-form {
      display: grid;
      gap: 15px;
    }
    .edit-form .form-group label {
      color: #aaa;
      font-size: 13px;
    }
    .edit-form .form-group input,
    .edit-form .form-group textarea,
    .edit-form .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .edit-form .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .save-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .save-btn:hover {
      transform: translateY(-2px);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #aaa;
    }
    .no-results {
      text-align: center;
      padding: 40px;
      color: #aaa;
    }
    .credit-badge {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(0, 212, 255, 0.2);
      border-radius: 4px;
      color: #00d4ff;
      font-size: 12px;
      font-weight: 600;
    }
    .role-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .role-admin {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }
    .role-user {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-active {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }
    .status-banned {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <h1>🔐 AdminXsoul</h1>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password">
      </div>
      <button class="login-btn" onclick="handleLogin()">Login</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <h1>👑 AdminXsoul Panel</h1>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value" id="totalUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Credits</h3>
        <div class="value" id="totalCredits">0</div>
      </div>
      <div class="stat-card">
        <h3>Active Users</h3>
        <div class="value" id="activeUsers">0</div>
      </div>
      <div class="stat-card">
        <h3>Banned Users</h3>
        <div class="value" id="bannedUsers">0</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search by username, email, or UID..." oninput="handleSearch()">
    </div>

    <div class="users-table">
      <table>
        <thead>
          <tr>
            <th>UID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Credits</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="8" class="loading">Loading users...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit User</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="edit-form" id="editForm">
        <!-- Form fields will be populated dynamically -->
      </div>
      <div style="margin-top: 20px; text-align: right;">
        <button class="save-btn" onclick="saveUserChanges()">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // Firebase Configuration - UPDATE WITH YOUR CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Hardcoded credentials
    const ADMIN_USERNAME = 'Admin';
    const ADMIN_PASSWORD = '254761';

    // State
    let allUsers = [];
    let currentEditingUser = null;

    // Login Handler
    function handleLogin() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');

      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        localStorage.setItem('adminLoggedIn', 'true');
        showAdminPanel();
      } else {
        errorEl.textContent = '❌ Invalid username or password';
      }
    }

    // Logout Handler
    function handleLogout() {
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').textContent = '';
    }

    // Show Admin Panel
    function showAdminPanel() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadUsers();
    }

    // Check if already logged in
    function checkAuth() {
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        showAdminPanel();
      }
    }

    // Load Users from Firebase
    async function loadUsers() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading users...</td></tr>';

      try {
        const snapshot = await db.ref('users').once('value');
        const usersData = snapshot.val() || {};
        
        allUsers = [];
        
        for (const uid in usersData) {
          const user = usersData[uid];
          allUsers.push({
            uid: uid,
            username: user.username || user.handle || 'N/A',
            email: user.email || 'N/A',
            credits: user.credits || 0,
            role: user.role || 'user',
            status: user.status || 'active',
            createdAt: user.createdAt || 'N/A',
            isAdmin: user.isAdmin || false,
            isBanned: user.isBanned || false,
            banReason: user.banReason || '',
            lastLogin: user.lastLogin || 'N/A',
            // Store full data for editing
            fullData: user
          });
        }

        updateStats();
        renderUsers(allUsers);
      } catch (error) {
        console.error('Error loading users:', error);
        tbody.innerHTML = '<tr><td colspan="8" class="error-msg">❌ Error loading users: ' + error.message + '</td></tr>';
      }
    }

    // Update Statistics
    function updateStats() {
      document.getElementById('totalUsers').textContent = allUsers.length;
      document.getElementById('totalCredits').textContent = allUsers.reduce((sum, u) => sum + (u.credits || 0), 0).toLocaleString();
      document.getElementById('activeUsers').textContent = allUsers.filter(u => u.status === 'active' && !u.isBanned).length;
      document.getElementById('bannedUsers').textContent = allUsers.filter(u => u.isBanned || u.status === 'banned').length;
    }

    // Render Users Table
    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="no-results">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td style="font-family: monospace; font-size: 12px;">${user.uid.substring(0, 12)}...</td>
          <td><strong>${user.username}</strong></td>
          <td>${user.email}</td>
          <td><span class="credit-badge">${user.credits.toLocaleString()}</span></td>
          <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role}</span></td>
          <td><span class="status-badge ${user.isBanned || user.status === 'banned' ? 'status-banned' : 'status-active'}">${user.isBanned || user.status === 'banned' ? 'Banned' : 'Active'}</span></td>
          <td style="font-size: 12px;">${formatDate(user.createdAt)}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editUser('${user.uid}')">Edit</button>
            <button class="action-btn delete-btn" onclick="banUser('${user.uid}')">${user.isBanned ? 'Unban' : 'Ban'}</button>
          </td>
        </tr>
      `).join('');
    }

    // Search Handler
    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      
      if (!query) {
        renderUsers(allUsers);
        return;
      }

      const filtered = allUsers.filter(user => 
        user.username.toLowerCase().includes(query) ||
        user.email.toLowerCase().includes(query) ||
        user.uid.toLowerCase().includes(query)
      );

      renderUsers(filtered);
    }

    // Edit User
    function editUser(uid) {
      currentEditingUser = allUsers.find(u => u.uid === uid);
      if (!currentEditingUser) return;

      const form = document.getElementById('editForm');
      form.innerHTML = `
        <div class="form-group">
          <label>UID</label>
          <input type="text" value="${currentEditingUser.uid}" disabled>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="editUsername" value="${currentEditingUser.username}">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" value="${currentEditingUser.email}">
        </div>
        <div class="form-group">
          <label>Credits</label>
          <input type="number" id="editCredits" value="${currentEditingUser.credits}">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="editRole">
            <option value="user" ${currentEditingUser.role === 'user' ? 'selected' : ''}>User</option>
            <option value="admin" ${currentEditingUser.role === 'admin' ? 'selected' : ''}>Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStatus">
            <option value="active" ${currentEditingUser.status === 'active' ? 'selected' : ''}>Active</option>
            <option value="banned" ${currentEditingUser.status === 'banned' ? 'selected' : ''}>Banned</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ban Reason</label>
          <textarea id="editBanReason">${currentEditingUser.banReason || ''}</textarea>
        </div>
        <div class="form-group">
          <label>Created At</label>
          <input type="text" value="${formatDate(currentEditingUser.createdAt)}" disabled>
        </div>
        <div class="form-group">
          <label>Last Login</label>
          <input type="text" value="${formatDate(currentEditingUser.lastLogin)}" disabled>
        </div>
      `;

      document.getElementById('editModal').classList.add('active');
    }

    // Close Edit Modal
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      currentEditingUser = null;
    }

    // Save User Changes
    async function saveUserChanges() {
      if (!currentEditingUser) return;

      const updates = {
        username: document.getElementById('editUsername').value,
        email: document.getElementById('editEmail').value,
        credits: parseInt(document.getElementById('editCredits').value) || 0,
        role: document.getElementById('editRole').value,
        status: document.getElementById('editStatus').value,
        banReason: document.getElementById('editBanReason').value,
        isBanned: document.getElementById('editStatus').value === 'banned'
      };

      try {
        await db.ref(`users/${currentEditingUser.uid}`).update(updates);
        alert('✅ User updated successfully!');
        closeEditModal();
        loadUsers();
      } catch (error) {
        alert('❌ Error updating user: ' + error.message);
      }
    }

    // Ban/Unban User
    async function banUser(uid) {
      const user = allUsers.find(u => u.uid === uid);
      if (!user) return;

      const action = user.isBanned ? 'unban' : 'ban';
      const confirmMsg = user.isBanned 
        ? `Are you sure you want to unban ${user.username}?`
        : `Are you sure you want to ban ${user.username}?`;

      if (!confirm(confirmMsg)) return;

      try {
        await db.ref(`users/${uid}`).update({
          isBanned: !user.isBanned,
          status: user.isBanned ? 'active' : 'banned',
          banReason: user.isBanned ? '' : (prompt('Ban reason (optional):') || '')
        });
        alert(`✅ User ${action}ed successfully!`);
        loadUsers();
      } catch (error) {
        alert('❌ Error: ' + error.message);
      }
    }

    // Format Date
    function formatDate(dateStr) {
      if (!dateStr || dateStr === 'N/A') return 'N/A';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('th-TH', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch {
        return dateStr;
      }
    }

    // Initialize
    checkAuth();

    // Handle Enter key on login
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginUsername').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
