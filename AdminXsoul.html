<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminXsoul - ระบบจัดการผู้ใช้</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh; color: #fff;
    }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 40px; border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      width: 100%; max-width: 400px;
    }
    .login-box h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; font-size: 28px; }
    .login-box .subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 16px;
      outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: #00d4ff; }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none; border-radius: 8px; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg { color: #ff6b6b; text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
    .admin-panel { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap; gap: 12px;
    }
    .admin-header h1 { color: #00d4ff; font-size: 28px; }
    .admin-header .who { color: #aaa; font-size: 13px; margin-top: 4px; }
    .logout-btn {
      padding: 10px 20px; background: rgba(255,107,107,0.2);
      border: 1px solid #ff6b6b; border-radius: 8px;
      color: #ff6b6b; cursor: pointer; transition: all 0.3s;
    }
    .logout-btn:hover { background: #ff6b6b; color: #fff; }
    .search-bar { margin-bottom: 24px; }
    .search-bar input {
      width: 100%; padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; outline: none;
    }
    .search-bar input:focus { border-color: #00d4ff; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 20px; border-radius: 12px; text-align: center;
    }
    .stat-card h3 { color: #aaa; font-size: 13px; margin-bottom: 10px; }
    .stat-card .value { color: #00d4ff; font-size: 26px; font-weight: 700; }
    .users-table { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: auto; }
    .users-table table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .users-table th, .users-table td {
      padding: 14px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .users-table th {
      background: rgba(0,212,255,0.1); color: #00d4ff;
      font-weight: 600; font-size: 13px; text-transform: uppercase;
    }
    .users-table tr:hover { background: rgba(255,255,255,0.05); }
    .users-table td { font-size: 14px; }
    .action-btn {
      padding: 6px 12px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; margin-right: 5px; transition: all 0.3s;
    }
    .edit-btn { background: rgba(0,212,255,0.2); color: #00d4ff; border: 1px solid #00d4ff; }
    .edit-btn:hover { background: #00d4ff; color: #fff; }
    .delete-btn { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid #ff6b6b; }
    .delete-btn:hover { background: #ff6b6b; color: #fff; }
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 1000;
      justify-content: center; align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: rgba(26,26,46,0.97); backdrop-filter: blur(10px);
      padding: 28px; border-radius: 16px;
      width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-header h2 { color: #00d4ff; font-size: 22px; }
    .close-btn { background: none; border: none; color: #aaa; font-size: 28px; cursor: pointer; }
    .close-btn:hover { color: #fff; }
    .edit-form { display: grid; gap: 14px; }
    .edit-form .form-group input,
    .edit-form .form-group textarea,
    .edit-form .form-group select { padding: 10px; font-size: 14px; }
    .edit-form .form-group textarea { resize: vertical; min-height: 80px; }
    .save-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none; border-radius: 8px; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .loading, .no-results { text-align: center; padding: 40px; color: #aaa; }
    .credit-badge { display: inline-block; padding: 4px 8px; background: rgba(0,212,255,0.2); border-radius: 4px; color: #00d4ff; font-size: 12px; font-weight: 600; }
    .role-badge, .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .role-admin { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .role-user { background: rgba(0,212,255,0.2); color: #00d4ff; }
    .status-active { background: rgba(76,175,80,0.2); color: #4caf50; }
    .status-banned { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .slip-btn { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid #ffc107; }
    .slip-btn:hover { background: #ffc107; color: #1a1a2e; }
    .topup-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; margin-bottom: 12px; display: grid; grid-template-columns: 120px 1fr auto; gap: 14px; align-items: center; }
    .topup-card img.slip-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; cursor: zoom-in; background: #000; border: 1px solid rgba(255,255,255,0.1); }
    .topup-card .no-slip { width: 120px; height: 120px; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.05); border-radius: 8px; color: #666; font-size: 12px; text-align:center; }
    .topup-info { font-size: 13px; line-height: 1.7; }
    .topup-info .amount { color: #4caf50; font-size: 18px; font-weight: 700; }
    .topup-info .meta { color: #aaa; font-size: 12px; }
    .image-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index: 2000; cursor: zoom-out; }
    .image-viewer.active { display: flex; }
    .image-viewer img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    /* Bell */
    .bell-wrap { position: relative; display: inline-block; margin-right: 12px; }
    .bell-btn { position: relative; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #ffc107; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: all 0.2s; }
    .bell-btn:hover { background: rgba(255,193,7,0.2); transform: scale(1.05); }
    .bell-btn.has-unread { animation: bell-shake 1.2s ease-in-out infinite; }
    @keyframes bell-shake { 0%,100%{transform:rotate(0)} 10%,30%{transform:rotate(-15deg)} 20%,40%{transform:rotate(15deg)} 50%{transform:rotate(0)} }
    .bell-badge { position: absolute; top: -4px; right: -4px; background: #ff3b3b; color: #fff; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px; border: 2px solid #1a1a2e; }
    .bell-badge.hidden { display: none; }
    .bell-dropdown { display: none; position: absolute; top: 54px; right: 0; width: 380px; max-height: 480px; overflow-y: auto; background: rgba(20,20,40,0.98); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 500; }
    .bell-dropdown.active { display: block; }
    .bell-dropdown-header { display:flex; justify-content:space-between; align-items:center; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:0; background: rgba(20,20,40,0.98); }
    .bell-dropdown-header h3 { color:#00d4ff; font-size:15px; }
    .bell-dropdown-header button { background:none; border:none; color:#aaa; font-size:12px; cursor:pointer; }
    .bell-dropdown-header button:hover { color:#00d4ff; }
    .notif-item { display:grid; grid-template-columns: 50px 1fr; gap:10px; padding:12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor:pointer; transition: background 0.2s; }
    .notif-item:hover { background: rgba(255,255,255,0.05); }
    .notif-item.unread { background: rgba(0,212,255,0.08); border-left: 3px solid #00d4ff; }
    .notif-item img, .notif-item .notif-noimg { width:50px; height:50px; border-radius:6px; object-fit:cover; background:#000; }
    .notif-item .notif-noimg { display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.05); color:#666; font-size: 20px; }
    .notif-item .notif-body { font-size: 13px; line-height: 1.5; }
    .notif-item .notif-user { color:#fff; font-weight:600; }
    .notif-item .notif-amount { color:#4caf50; font-weight:700; }
    .notif-item .notif-when { color:#888; font-size: 11px; }
    .notif-empty { padding: 30px; text-align:center; color:#888; font-size:13px; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginScreen">
    <div class="login-box">
      <h1>🔐 AdminXsoul</h1>
      <p class="subtitle">เข้าสู่ระบบด้วย Email/Password</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="กรอก Email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <div>
        <h1>👑 AdminXsoul Panel</h1>
        <div class="who" id="currentAdmin"></div>
      </div>
      <div style="display:flex;align-items:center;">
        <div class="bell-wrap">
          <button class="bell-btn" id="bellBtn" onclick="toggleBellDropdown(event)" title="แจ้งเตือนเติมเงิน">🔔<span class="bell-badge hidden" id="bellBadge">0</span></button>
          <div class="bell-dropdown" id="bellDropdown" onclick="event.stopPropagation()">
            <div class="bell-dropdown-header">
              <h3>🧾 การเติมเงินล่าสุด</h3>
              <button onclick="markAllNotifsRead()">อ่านทั้งหมด</button>
            </div>
            <div id="notifList"><div class="notif-empty">กำลังโหลด...</div></div>
          </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>


    <div class="stats-grid">
      <div class="stat-card"><h3>Total Users</h3><div class="value" id="totalUsers">0</div></div>
      <div class="stat-card"><h3>Total Credits</h3><div class="value" id="totalCredits">0</div></div>
      <div class="stat-card"><h3>Active Users</h3><div class="value" id="activeUsers">0</div></div>
      <div class="stat-card"><h3>Banned Users</h3><div class="value" id="bannedUsers">0</div></div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 ค้นหาจาก username, email หรือ UID..." oninput="handleSearch()">
    </div>

    <div class="users-table">
      <table>
        <thead>
          <tr>
            <th>UID</th><th>Username</th><th>Email</th><th>Credits</th>
            <th>Role</th><th>Status</th><th>Created</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="8" class="loading">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Slips Modal -->
  <div class="modal" id="slipsModal">
    <div class="modal-content" style="max-width: 760px;">
      <div class="modal-header">
        <h2>🧾 ประวัติการเติมเงิน</h2>
        <button class="close-btn" onclick="closeSlipsModal()">&times;</button>
      </div>
      <div id="slipsContent"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- Image Viewer -->
  <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
    <img id="imageViewerImg" alt="slip">
  </div>

  <!-- Edit User Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit User</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="edit-form" id="editForm"></div>
      <div style="margin-top: 20px; text-align: right;">
        <button class="save-btn" onclick="saveUserChanges()">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // ===== Firebase Config =====
    const firebaseConfig = {
      apiKey: "AIzaSyBUPSUB6Ic8lqKYC7FTRa_szjQmTFeXYlQ",
      authDomain: "xsoul-hud-21e3d.firebaseapp.com",
      projectId: "xsoul-hud-21e3d",
      storageBucket: "xsoul-hud-21e3d.appspot.com",
      databaseURL: "https://xsoul-hud-21e3d-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    // Use a separate Firebase app instance for admin panel to avoid conflicts
    firebase.initializeApp(firebaseConfig, 'adminPanel');
    const auth = firebase.app('adminPanel').auth();
    const db = firebase.app('adminPanel').database();

    let allUsers = [];
    let currentEditingUser = null;
    let currentAdminUid = null;

    // ===== Helpers =====
    const $ = (id) => document.getElementById(id);
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    // ===== Firebase Auth =====
    async function handleLogin() {
      const email = $('loginEmail').value.trim();
      const password = $('loginPassword').value;
      const errorEl = $('loginError');
      const btn = $('loginBtn');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = '❌ กรุณากรอกอีเมลและรหัสผ่าน';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      try {
        await auth.signInWithEmailAndPassword(email, password);
        // onAuthStateChanged จะตรวจสิทธิ์ admin ต่อ
      } catch (err) {
        errorEl.textContent = '❌ ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    }

    async function handleLogout() {
      await auth.signOut();
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        showLoginScreen();
        return;
      }
      // ตรวจสิทธิ์ admin จาก database
      try {
        const snap = await db.ref(`users/${user.uid}/role`).once('value');
        if (snap.val() === 'admin') {
          currentAdminUid = user.uid;
          $('currentAdmin').textContent = `เข้าสู่ระบบในชื่อ: ${user.email}`;
          showAdminPanel();
        } else {
          await auth.signOut();
          $('loginError').textContent = '❌ บัญชีนี้ไม่มีสิทธิ์ admin';
          showLoginScreen();
        }
      } catch (err) {
        await auth.signOut();
        $('loginError').textContent = '❌ ตรวจสิทธิ์ไม่สำเร็จ: ' + err.message;
        showLoginScreen();
      }
    });

    function showLoginScreen() {
      $('loginScreen').style.display = 'flex';
      $('adminPanel').style.display = 'none';
      $('loginPassword').value = '';
    }

    function showAdminPanel() {
      $('loginScreen').style.display = 'none';
      $('adminPanel').style.display = 'block';
      $('loginError').textContent = '';
      loadUsers();
      setupTopupNotifications();
    }

    // ===== Data =====
    async function loadUsers() {
      const tbody = $('usersTableBody');
      tbody.innerHTML = '<tr><td colspan="8" class="loading">Loading users...</td></tr>';
      try {
        const snapshot = await db.ref('users').once('value');
        const usersData = snapshot.val() || {};
        allUsers = Object.entries(usersData).map(([uid, u]) => ({
          uid,
          username: u.username || u.handle || 'N/A',
          email: u.email || 'N/A',
          credits: Number(u.credits) || 0,
          rank: u.rank || 'Free',
          role: u.role || (u.isAdmin ? 'admin' : 'user'),
          status: u.status || (u.isBanned ? 'banned' : 'active'),
          createdAt: u.createdAt || 'N/A',
          lastLogin: u.lastLogin || 'N/A',
          isAdmin: !!u.isAdmin,
          isBanned: !!u.isBanned,
          banReason: u.banReason || '',
          referrer: u.referrer || ''
        }));
        updateStats();
        renderUsers(allUsers);
      } catch (error) {
        console.error('Error loading users:', error);
        tbody.innerHTML = `<tr><td colspan="8" class="no-results">❌ โหลดข้อมูลไม่สำเร็จ: ${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function updateStats() {
      $('totalUsers').textContent = allUsers.length;
      $('totalCredits').textContent = allUsers.reduce((s, u) => s + u.credits, 0).toLocaleString();
      $('activeUsers').textContent = allUsers.filter(u => !u.isBanned && u.status !== 'banned').length;
      $('bannedUsers').textContent = allUsers.filter(u => u.isBanned || u.status === 'banned').length;
    }

    function renderUsers(users) {
      const tbody = $('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="no-results">ไม่พบผู้ใช้</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => {
        const banned = u.isBanned || u.status === 'banned';
        return `
        <tr>
          <td style="font-family:monospace;font-size:12px;">${escapeHtml(u.uid.substring(0,12))}…</td>
          <td><strong>${escapeHtml(u.username)}</strong></td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="credit-badge">${u.credits.toLocaleString()}</span></td>
          <td><span class="role-badge ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${escapeHtml(u.role)}</span></td>
          <td><span class="status-badge ${banned ? 'status-banned' : 'status-active'}">${banned ? 'Banned' : 'Active'}</span></td>
          <td style="font-size:12px;">${escapeHtml(formatDate(u.createdAt))}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editUser('${escapeHtml(u.uid)}')">Edit</button>
            <button class="action-btn slip-btn" onclick="viewSlips('${escapeHtml(u.uid)}')">Slips</button>
            <button class="action-btn delete-btn" onclick="banUser('${escapeHtml(u.uid)}')">${banned ? 'Unban' : 'Ban'}</button>
          </td>
        </tr>`;
      }).join('');
    }

    function handleSearch() {
      const q = $('searchInput').value.toLowerCase();
      if (!q) return renderUsers(allUsers);
      renderUsers(allUsers.filter(u =>
        u.username.toLowerCase().includes(q) ||
        u.email.toLowerCase().includes(q) ||
        u.uid.toLowerCase().includes(q)
      ));
    }

    function editUser(uid) {
      currentEditingUser = allUsers.find(u => u.uid === uid);
      if (!currentEditingUser) return;
      const u = currentEditingUser;
      $('editForm').innerHTML = `
        <div class="form-group"><label>UID</label><input type="text" value="${escapeHtml(u.uid)}" disabled></div>
        <div class="form-group"><label>Username</label><input type="text" id="editUsername" value="${escapeHtml(u.username)}"></div>
        <div class="form-group"><label>Email</label><input type="email" id="editEmail" value="${escapeHtml(u.email)}"></div>
        <div class="form-group"><label>Credits</label><input type="number" id="editCredits" value="${u.credits}"></div>
        <div class="form-group"><label>Rank</label>
          <select id="editRank">
            <option value="Free" ${u.rank==='Free'?'selected':''}>Free</option>
            <option value="Bronze" ${u.rank==='Bronze'?'selected':''}>Bronze</option>
            <option value="Silver" ${u.rank==='Silver'?'selected':''}>Silver</option>
            <option value="Gold" ${u.rank==='Gold'?'selected':''}>Gold</option>
            <option value="Platinum" ${u.rank==='Platinum'?'selected':''}>Platinum</option>
            <option value="Diamond" ${u.rank==='Diamond'?'selected':''}>Diamond</option>
            <option value="Premium" ${u.rank==='Premium'?'selected':''}>Premium (P-MAX)</option>
          </select>
        </div>
        <div class="form-group"><label>Referrer</label><input type="text" id="editReferrer" value="${escapeHtml(u.referrer || '')}"></div>
        <div class="form-group"><label>Ban Reason</label><textarea id="editBanReason">${escapeHtml(u.banReason || '')}</textarea></div>
      `;
      $('editModal').classList.add('active');
    }

    function closeEditModal() {
      $('editModal').classList.remove('active');
      currentEditingUser = null;
    }

    async function saveUserChanges() {
      if (!currentEditingUser) return;
      const updates = {
        username: $('editUsername').value.trim(),
        email: $('editEmail').value.trim(),
        credits: parseInt($('editCredits').value, 10) || 0,
        rank: $('editRank').value,
        referrer: $('editReferrer').value.trim(),
        banReason: $('editBanReason').value
      };
      try {
        await db.ref(`users/${currentEditingUser.uid}`).update(updates);
        alert('✅ บันทึกสำเร็จ');
        closeEditModal();
        loadUsers();
      } catch (err) {
        alert('❌ บันทึกไม่สำเร็จ: ' + err.message);
      }
    }

    async function banUser(uid) {
      const u = allUsers.find(x => x.uid === uid);
      if (!u) return;
      const willBan = !u.isBanned;
      if (!confirm(willBan ? `Ban ${u.username} ?` : `Unban ${u.username} ?`)) return;
      const reason = willBan ? (prompt('เหตุผลการ ban (ไม่บังคับ):') || '') : '';
      try {
        await db.ref(`users/${uid}`).update({
          isBanned: willBan,
          status: willBan ? 'banned' : 'active',
          banReason: reason
        });
        loadUsers();
      } catch (err) {
        alert('❌ ' + err.message);
      }
    }

    function formatDate(d) {
      if (!d || d === 'N/A') return 'N/A';
      try {
        const date = new Date(d);
        if (isNaN(date.getTime())) return String(d);
        return date.toLocaleString('th-TH', {
          year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
        });
      } catch { return String(d); }
    }

    // ===== Slips / Top-up history =====
    // ค้นหาจาก path ที่ใช้จริงใน index.html: users/{uid}/topupRequests, users/{uid}/topupHistory
    async function fetchUserTopups(uid) {
      const paths = [`users/${uid}/topupRequests`, `users/${uid}/topupHistory`, `topups/${uid}`, `slips/${uid}`, `users/${uid}/topups`, `users/${uid}/slips`];
      for (const p of paths) {
        try {
          const snap = await db.ref(p).once('value');
          const val = snap.val();
          if (val && typeof val === 'object') {
            return { path: p, items: Object.entries(val).map(([id, v]) => ({ id, ...v })) };
          }
        } catch (_) {}
      }
      return { path: null, items: [] };
    }

    let currentSlipsPath = null;
    let currentSlipsUid = null;

    async function viewSlips(uid) {
      const user = allUsers.find(u => u.uid === uid);
      currentSlipsUid = uid;
      $('slipsContent').innerHTML = '<div class="loading">กำลังโหลด...</div>';
      $('slipsModal').classList.add('active');
      const { path, items } = await fetchUserTopups(uid);
      currentSlipsPath = path;
      renderSlips(user, items);
    }

    function renderSlips(user, items) {
      const header = `<div style="margin-bottom:14px;color:#aaa;font-size:13px;">
        ผู้ใช้: <strong style="color:#fff;">${escapeHtml(user?.username || '')}</strong>
        — รวม ${items.length} รายการ
      </div>`;
      if (!items.length) {
        $('slipsContent').innerHTML = header + '<div class="no-results">ไม่พบประวัติการเติมเงิน</div>';
        return;
      }
      // sort newest first
      items.sort((a, b) => {
        const ta = new Date(a.timestamp || a.createdAt || a.date || 0).getTime();
        const tb = new Date(b.timestamp || b.createdAt || b.date || 0).getTime();
        return tb - ta;
      });
      const html = items.map(it => {
        const slip = it.slipUrl || it.slip || it.imageUrl || it.image || it.slipBase64 || it.url || '';
        const isImg = slip && (slip.startsWith('http') || slip.startsWith('data:'));
        const amount = it.amount ?? it.credits ?? it.price ?? 0;
        const status = it.status || 'pending';
        const when = formatDate(it.timestamp || it.createdAt || it.date);
        const ref = it.ref || it.reference || it.txId || it.id;
        const slipHtml = isImg
          ? `<img class="slip-thumb" src="${escapeHtml(slip)}" alt="slip" onclick="openImageViewer('${escapeHtml(slip)}')" onerror="this.outerHTML='<div class=&quot;no-slip&quot;>โหลดภาพไม่ได้</div>'">`
          : `<div class="no-slip">ไม่มีสลิป</div>`;
        return `
          <div class="topup-card">
            ${slipHtml}
            <div class="topup-info">
              <div class="amount">฿ ${Number(amount).toLocaleString()}</div>
              <div>สถานะ: <span class="status-badge ${status==='approved'||status==='success'?'status-active':'status-banned'}">${escapeHtml(status)}</span></div>
              <div class="meta">เมื่อ: ${escapeHtml(when)}</div>
              <div class="meta">Ref: ${escapeHtml(ref)}</div>
            </div>
            <div>
              <button class="action-btn delete-btn" onclick="deleteSlip('${escapeHtml(it.id)}')">ลบ</button>
            </div>
          </div>
        `;
      }).join('');
      $('slipsContent').innerHTML = header + html;
    }

    async function deleteSlip(id) {
      if (!currentSlipsPath || !currentSlipsUid) return;
      if (!confirm('ยืนยันลบรายการเติมเงินนี้?')) return;
      try {
        await db.ref(`${currentSlipsPath}/${id}`).remove();
        viewSlips(currentSlipsUid); // refresh
      } catch (err) {
        alert('❌ ลบไม่สำเร็จ: ' + err.message);
      }
    }

    function closeSlipsModal() {
      $('slipsModal').classList.remove('active');
      currentSlipsPath = null;
      currentSlipsUid = null;
    }

    function openImageViewer(src) {
      $('imageViewerImg').src = src;
      $('imageViewer').classList.add('active');
    }
    function closeImageViewer() {
      $('imageViewer').classList.remove('active');
      $('imageViewerImg').src = '';
    }

    // Enter key เพื่อ login
    ['loginEmail','loginPassword'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    // ===== Top-up Notifications (Bell) =====
    // เก็บรายการเติมเงินทั้งหมดจาก adminNotifications/topup + users/*/topupRequests
    let allTopups = []; // [{id, uid, path, ...data}]
    let seenIds = new Set(JSON.parse(localStorage.getItem('seenTopupIds') || '[]'));
    const NOTIF_PATHS = ['adminNotifications/topup', 'users']; // root nodes ที่จะสแกน
    let notifInitialized = false;

    function persistSeen() {
      // เก็บแค่ 500 ล่าสุดกัน localStorage บวม
      const arr = Array.from(seenIds).slice(-500);
      localStorage.setItem('seenTopupIds', JSON.stringify(arr));
    }

    async function setupTopupNotifications() {
      if (notifInitialized) return;
      notifInitialized = true;
      
      // 1) โหลดจาก adminNotifications/topup (path ที่ index.html เขียน)
      try {
        const snap = await db.ref('adminNotifications/topup').once('value');
        const val = snap.val();
        if (val && typeof val === 'object') {
          Object.entries(val).forEach(([id, data]) => {
            if (data && typeof data === 'object') {
              // Parse uid from key format: {ts}_{uid}
              const parts = id.split('_');
              const uid = parts.length > 1 ? parts[parts.length - 1] : (data.uid || '');
              allTopups.push({ id, uid, path: `adminNotifications/topup/${id}`, ...data });
            }
          });
        }
      } catch (e) { console.warn('scan adminNotifications/topup', e); }
      
      // 2) โหลดจาก users/*/topupRequests (path ที่ index.html เขียน)
      try {
        const usersSnap = await db.ref('users').once('value');
        const usersVal = usersSnap.val();
        if (usersVal && typeof usersVal === 'object') {
          Object.entries(usersVal).forEach(([uid, userData]) => {
            if (userData && typeof userData === 'object') {
              const topupRequests = userData.topupRequests;
              if (topupRequests && typeof topupRequests === 'object') {
                Object.entries(topupRequests).forEach(([id, data]) => {
                  if (data && typeof data === 'object') {
                    allTopups.push({ id, uid, path: `users/${uid}/topupRequests/${id}`, ...data });
                  }
                });
              }
            }
          });
        }
      } catch (e) { console.warn('scan users/*/topupRequests', e); }
      
      renderNotifs();

      // 3) ฟัง realtime adminNotifications/topup
      db.ref('adminNotifications/topup').on('child_added', (snap) => {
        const id = snap.key;
        const data = snap.val();
        if (!data || typeof data !== 'object') return;
        const parts = id.split('_');
        const uid = parts.length > 1 ? parts[parts.length - 1] : (data.uid || '');
        addTopupRealtime({ id, uid, path: `adminNotifications/topup/${id}`, ...data });
      });
      
      db.ref('adminNotifications/topup').on('child_removed', (snap) => {
        allTopups = allTopups.filter(t => !t.path.startsWith(`adminNotifications/topup/${snap.key}`));
        renderNotifs();
      });
      
      // 4) ฟัง realtime users/*/topupRequests (ใช้ wildcard ไม่ได้ใน Firebase Compat, ต้องฟัง users level)
      db.ref('users').on('child_added', (userSnap) => {
        const uid = userSnap.key;
        db.ref(`users/${uid}/topupRequests`).on('child_added', (reqSnap) => {
          const id = reqSnap.key;
          const data = reqSnap.val();
          if (!data) return;
          addTopupRealtime({ id, uid, path: `users/${uid}/topupRequests/${id}`, ...data });
        });
        db.ref(`users/${uid}/topupRequests`).on('child_removed', (reqSnap) => {
          allTopups = allTopups.filter(t => !(t.id === reqSnap.key && t.uid === uid));
          renderNotifs();
        });
      });
    }

    function addTopupRealtime(item) {
      // กันซ้ำ
      if (allTopups.some(t => t.path === item.path)) return;
      allTopups.push(item);
      renderNotifs();
    }

    function getUnreadCount() {
      return allTopups.filter(t => !seenIds.has(t.path)).length;
    }

    function renderNotifs() {
      const unread = getUnreadCount();
      const badge = $('bellBadge');
      const btn = $('bellBtn');
      if (unread > 0) {
        badge.textContent = unread > 99 ? '99+' : unread;
        badge.classList.remove('hidden');
        btn.classList.add('has-unread');
      } else {
        badge.classList.add('hidden');
        btn.classList.remove('has-unread');
      }
      // sort ใหม่สุดก่อน
      const sorted = [...allTopups].sort((a, b) => {
        const ta = new Date(a.timestamp || a.createdAt || a.date || 0).getTime();
        const tb = new Date(b.timestamp || b.createdAt || b.date || 0).getTime();
        return tb - ta;
      }).slice(0, 50);
      const list = $('notifList');
      if (!sorted.length) {
        list.innerHTML = '<div class="notif-empty">ยังไม่มีรายการเติมเงิน</div>';
        return;
      }
      list.innerHTML = sorted.map(t => {
        const isUnread = !seenIds.has(t.path);
        const slip = t.slipUrl || t.slip || t.imageUrl || t.image || t.slipBase64 || t.url || '';
        const isImg = slip && (slip.startsWith('http') || slip.startsWith('data:'));
        const user = allUsers.find(u => u.uid === t.uid);
        const name = user ? user.username : (t.uid ? t.uid.substring(0,10)+'…' : 'unknown');
        const amount = t.amount ?? t.credits ?? t.price ?? 0;
        const when = formatDate(t.timestamp || t.createdAt || t.date);
        const thumb = isImg
          ? `<img src="${escapeHtml(slip)}" alt="" onerror="this.outerHTML='<div class=&quot;notif-noimg&quot;>📄</div>'">`
          : `<div class="notif-noimg">📄</div>`;
        return `<div class="notif-item ${isUnread?'unread':''}" onclick="openNotif('${escapeHtml(t.uid)}','${escapeHtml(t.path)}')">
          ${thumb}
          <div class="notif-body">
            <div><span class="notif-user">${escapeHtml(name)}</span> เติม <span class="notif-amount">฿${Number(amount).toLocaleString()}</span></div>
            <div class="notif-when">${escapeHtml(when)}</div>
          </div>
        </div>`;
      }).join('');
    }

    function toggleBellDropdown(e) {
      e.stopPropagation();
      $('bellDropdown').classList.toggle('active');
    }
    document.addEventListener('click', (e) => {
      const dd = $('bellDropdown');
      if (dd && dd.classList.contains('active') && !e.target.closest('.bell-wrap')) {
        dd.classList.remove('active');
      }
    });

    function openNotif(uid, path) {
      if (path) { seenIds.add(path); persistSeen(); renderNotifs(); }
      $('bellDropdown').classList.remove('active');
      if (uid) viewSlips(uid);
    }

    function markAllNotifsRead() {
      allTopups.forEach(t => seenIds.add(t.path));
      persistSeen();
      renderNotifs();
    }
  </script>

</body>
</html>
